name: smartcart_canada
description: "SmartCart Canada - Privacy-first grocery price intelligence for Canadians."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Barcode Scanner
  mobile_scanner: ^7.2.0

  # HTTP Requests
  http: ^1.6.0

  # Supabase
  supabase_flutter: ^2.9.1

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Receipt Images
  image_picker: ^1.1.2

  # On-device OCR
  google_mlkit_text_recognition: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env